<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Caption Animator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0c0f14;
      --panel: rgba(18, 22, 30, 0.82);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --muted: #93a0b3;
      --ok: #17391d;
      --err: #5a1717;
      --info: #19304e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr;
    }

    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .video-shell {
      position: relative;
      width: min(92vw, 1600px);
      height: min(88vh, 960px);
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #000;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }

    .media-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .media-frame {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: fit-content;
      height: fit-content;
      max-width: 100%;
      max-height: 100%;
    }

    .media-frame video {
      display: none;
      width: auto;
      height: auto;
      max-width: min(92vw, 1600px);
      max-height: min(88vh, 960px);
      object-fit: contain;
      background: #000;
    }

    .placeholder {
      color: #6d7887;
      text-align: center;
      padding: 30px;
      max-width: 440px;
      line-height: 1.5;
    }

    .helper-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .helper-layer.hidden {
      display: none !important;
    }

    .helper-safe-area {
      position: absolute;
      inset: 6%;
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 12px;
      pointer-events: none;
    }





    .helper-caption {
      position: absolute;
      left: 50%;
      top: 85%;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      width: 82%;
      min-width: 140px;
      max-width: 82%;
      min-height: 48px;
      text-align: center;
      white-space: pre-wrap;
      line-height: 1.15;
      user-select: none;
      cursor: grab;
      pointer-events: auto;
      padding: 0.06em 0.16em;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .helper-caption.is-dragging {
      cursor: grabbing;
    }

    .helper-caption::after {
      content: "";
      position: absolute;
      inset: -10px;
      border: 1px dashed rgba(255,255,255,0.24);
      border-radius: 12px;
      pointer-events: none;
    }

    .helper-caption-text {
      display: block;
      width: 100%;
      text-align: center;
      white-space: pre-wrap;
      line-height: inherit;
    }

    .helper-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #000000;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.25);
      pointer-events: auto;
    }

    .helper-handle-tl {
      top: -18px;
      left: -18px;
      cursor: nwse-resize;
    }

    .helper-handle-br {
      right: -18px;
      bottom: -18px;
      cursor: nwse-resize;
    }




    .topbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 30;
    }

    .badge,
    .actions {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .badge {
      color: var(--muted);
      font-size: 13px;
      max-width: 44vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      flex-wrap: wrap;
    }

    .actions button,
    .actions a,
    .actions label,
    .actions select {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: #000;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
    }

    .actions label,
    .actions select.secondary,
    .actions button.secondary,
    .actions a.secondary {
      background: #2a3140;
      color: #fff;
    }

    .actions input[type="file"] {
      display: none;
    }

    .status {
      position: absolute;
      left: 16px;
      bottom: 16px;
      max-width: min(520px, calc(100vw - 32px));
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      font-size: 14px;
      line-height: 1.4;
      background: var(--panel);
      z-index: 30;
    }

    .status.show { display: block; }
    .status.info { background: rgba(25, 48, 78, 0.85); }
    .status.ok { background: rgba(23, 57, 29, 0.85); }
    .status.err { background: rgba(90, 23, 23, 0.9); }

    .hint {
      position: absolute;
      right: 16px;
      bottom: 16px;
      padding: 10px 12px;
      border-radius: 14px;
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.4;
      background: var(--panel);
      color: var(--muted);
      max-width: 420px;
      text-align: right;
      z-index: 30;
    }

    .lil-gui.root {
      --background-color: rgba(20, 24, 32, 0.92);
      --widget-color: rgba(255, 255, 255, 0.08);
      --hover-color: rgba(255, 255, 255, 0.12);
      --focus-color: rgba(255, 255, 255, 0.15);
      --text-color: #f3f4f6;
      --title-background-color: rgba(255, 255, 255, 0.05);
      --title-text-color: #ffffff;
      --number-color: #9fd3ff;
      --string-color: #d6f5b0;
      position: fixed;
      top: 72px;
      right: 16px;
      max-height: calc(100vh - 88px);
      overflow: auto;
      z-index: 40;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .hint {
        display: none;
      }

      .lil-gui.root {
        top: auto;
        right: 8px;
        bottom: 8px;
        max-height: 58vh;
      }

      .badge {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage">
      <div class="topbar">
        <div class="badge" id="selectionMeta">No files selected.</div>


        <!-- Keep only backend bridge elements required by the current JavaScript while moving visible controls to lil-gui. -->
        <div class="backend-bridge" hidden aria-hidden="true">
          <!-- Backend file input used by lil-gui video actions and drag/drop import. -->
          <input type="file" id="video" accept=".mp4,.mov,.m4v">

          <!-- Backend file input used by lil-gui subtitle actions and drag/drop import. -->
          <input type="file" id="srt" accept=".srt,.vtt">

          <!-- Backend preset selector used by preset storage and lil-gui preset sync. -->
          <select id="presetSelect" title="Choose preset">
            <option value="">Preset…</option>
          </select>

          <!-- Backend preset action buttons preserved for existing event bindings. -->
          <button id="savePresetBtn" type="button">Save</button>
          <button id="saveAsPresetBtn" type="button">Save As</button>
          <button id="deletePresetBtn" type="button">Delete preset</button>
          <button id="exportPresetBtn" type="button">Export preset</button>

          <!-- Backend preset import input preserved for existing import flow. -->
          <input type="file" id="presetImportInput" accept=".json,application/json">

          <!-- Backend render/reset buttons preserved for existing event bindings. -->
          <button id="previewBtn" type="button">Render preview</button>
          <button id="renderFullBtn" type="button">Render full</button>
          <button id="resetBtn" type="button">Reset</button>

          <!-- Backend result links preserved for existing render result flow. -->
          <a id="openPreview" href="#" target="_blank" rel="noopener" style="display:none;">Open preview</a>
          <a id="openAss" href="#" target="_blank" rel="noopener" style="display:none;">Open ASS</a>
        </div>



      </div>

      <div class="video-shell" id="videoShell">
        <div class="media-stage">
          <div class="media-frame" id="mediaFrame">
            <div id="placeholder" class="placeholder">
              Choose a video and SRT, drag the helper text on the real video area, then render the preview.
            </div>

            <video id="previewVideo" controls playsinline></video>

            <div class="helper-layer" id="helperLayer" style="display:none;">
              <div class="helper-safe-area"></div>

              <div class="helper-caption" id="helperCaption">
                <div class="helper-handle helper-handle-tl" id="helperHandleTL"></div>
                <span id="helperCaptionText" class="helper-caption-text">Preview caption will appear here</span>
                <div class="helper-handle helper-handle-br" id="helperHandleBR"></div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <div id="status" class="status"></div>

      <div class="hint">
        H = toggle helpers.<br>
        Helper font is scaled to the displayed video size so it matches the rendered preview more closely.
      </div>
    </div>
  </div>

  <script type="module">
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm';

    const videoInput = document.getElementById('video');
    const srtInput = document.getElementById('srt');
    const previewBtn = document.getElementById('previewBtn');
    const renderFullBtn = document.getElementById('renderFullBtn');
    const resetBtn = document.getElementById('resetBtn');
    const previewVideo = document.getElementById('previewVideo');
    const placeholder = document.getElementById('placeholder');
    const selectionMeta = document.getElementById('selectionMeta');
    const statusEl = document.getElementById('status');
    const openPreview = document.getElementById('openPreview');
    const openAss = document.getElementById('openAss');
    const videoShell = document.getElementById('videoShell');
    const mediaFrame = document.getElementById('mediaFrame');
    const helperLayer = document.getElementById('helperLayer');
    const helperCaption = document.getElementById('helperCaption');
    const helperCaptionText = document.getElementById('helperCaptionText');
    const helperHandleTL = document.getElementById('helperHandleTL');
    const helperHandleBR = document.getElementById('helperHandleBR');
    const presetSelect = document.getElementById('presetSelect');
    const savePresetBtn = document.getElementById('savePresetBtn');
    const saveAsPresetBtn = document.getElementById('saveAsPresetBtn');
    const deletePresetBtn = document.getElementById('deletePresetBtn');
    const exportPresetBtn = document.getElementById('exportPresetBtn');
    const presetImportInput = document.getElementById('presetImportInput');

    const PRESET_DB_NAME = 'captionAnimatorPresetsDB';
    const PRESET_STORE_NAME = 'presets';
    const PRESET_LOCALSTORAGE_KEY = 'captionAnimatorPresetsMirror';

    /* Persist the last loaded source video in browser storage so it can be reused without re-uploading. */
    const VIDEO_CACHE_DB_NAME = 'captionAnimatorSourceVideoDB';
    const VIDEO_CACHE_STORE_NAME = 'videos';
    const VIDEO_CACHE_KEY = 'lastVideo';
    const VIDEO_CACHE_META_KEY = 'captionAnimatorLastVideoMeta';

    let pollTimer = null;
    let sourceObjectUrl = null;
    let srtPreviewText = 'Preview caption will appear here';

/* Store parsed subtitle cues for native in-browser preview playback. */
    let subtitleCues = [];

/* Track whether the local preview should follow subtitle timing on the source video. */
    let nativeCaptionPreviewEnabled = true;

    let dragState = null;
    let resizeState = null;
    let presetDb = null;
    let presetsCache = {};
    let helpersVisible = true;
/* Keep metadata for the last cached source video available across reloads. */
    let cachedVideoMeta = readCachedVideoMetaFromStorage();



/* Define the complete default editor state used by lil-gui, reset flows, and render requests. */
    const defaultControls = {
  /* Typography controls. */
      font_name: 'Arial',
      font_size: 24,
      helper_font_scale: 0.86,
      bold: false,
      italic: false,
      primary_colour: '#ffffff',
      active_word_colour: '#ff0000',
      active_word_lead_ms: 80,
      outline_colour: '#000000',
      shadow_colour: '#000000',
      background_colour: '#000000',
      use_background: false,
      background_alpha: 0.45,
      outline: 2,
      shadow: 0,
      blur: 0.8,

  /* Placement controls. */
      alignment: 2,
      margin_v: 60,
      margin_h: 40,
      anchor_x: 0.5,
      anchor_y: 0.9,
      offset_x: 0,
      offset_y: 0,
      rotation_z: 0,
      letter_spacing: 0,

  /* Animation controls. */
      animation_type: 'fade',
      intro_ms: 180,
      outro_ms: 120,
      start_scale: 100,
      end_scale: 100,
      start_alpha: '99',
      mid_alpha: '44',
      end_alpha: '66',
      in_offset_x: 0,
      in_offset_y: 18,
      out_offset_x: 0,
      out_offset_y: 0,
      overshoot_amount: 8,
      overshoot_ms: 90,
      settle_ms: 90,
      out_mode: 'fade',

  /* Preview controls. */
      preview_start: 0,
      preview_duration: 8
    };


    const controls = { ...defaultControls };


    /* Show status panel with current state or error. */
    function showStatus(kind, message) {
      statusEl.className = `status show ${kind}`;
      statusEl.innerHTML = message;
    }

    /* Hide status panel. */
    function clearStatus() {
      statusEl.className = 'status';
      statusEl.innerHTML = '';
    }

    /* Put dropped file into a hidden file input. */
    function setFileInput(input, file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
    }

/* Read cached source-video metadata from localStorage for quick UI restore. */
    function readCachedVideoMetaFromStorage() {
      try {
        const raw = localStorage.getItem(VIDEO_CACHE_META_KEY);
        if (!raw) {
          return null;
        }

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') {
          return null;
        }

        return {
          name: String(parsed.name || ''),
          type: String(parsed.type || 'video/mp4'),
          size: Number(parsed.size || 0),
          lastModified: Number(parsed.lastModified || Date.now()),
          savedAt: Number(parsed.savedAt || Date.now())
        };
      } catch {
        return null;
      }
    }

/* Persist cached source-video metadata for fast reload and UI display. */
    function writeCachedVideoMetaToStorage(meta) {
  /* Vulnerable block: persist only the small metadata object, never arbitrary DOM state or HTML. */
      localStorage.setItem(VIDEO_CACHE_META_KEY, JSON.stringify({
        name: String(meta.name || ''),
        type: String(meta.type || 'video/mp4'),
        size: Number(meta.size || 0),
        lastModified: Number(meta.lastModified || Date.now()),
        savedAt: Number(meta.savedAt || Date.now())
      }));
    }

/* Open the IndexedDB database used for source-video caching. */
    function openVideoCacheDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(VIDEO_CACHE_DB_NAME, 1);

        request.onupgradeneeded = () => {
          const db = request.result;

          if (!db.objectStoreNames.contains(VIDEO_CACHE_STORE_NAME)) {
            db.createObjectStore(VIDEO_CACHE_STORE_NAME, { keyPath: 'id' });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error('Could not open video cache database.'));
      });
    }

/* Save the current source video into IndexedDB for reuse after reload. */
    async function saveCachedSourceVideo(file) {
      if (!(file instanceof Blob)) {
        return;
      }

      const db = await openVideoCacheDb();

      await new Promise((resolve, reject) => {
        const tx = db.transaction(VIDEO_CACHE_STORE_NAME, 'readwrite');
        const store = tx.objectStore(VIDEO_CACHE_STORE_NAME);

    /* Vulnerable block: store a single known cache record under a fixed key to avoid unbounded growth. */
        store.put({
          id: VIDEO_CACHE_KEY,
          blob: file,
          name: file.name || 'cached-video.mp4',
          type: file.type || 'video/mp4',
          size: Number(file.size || 0),
          lastModified: Number(file.lastModified || Date.now()),
          savedAt: Date.now()
        });

        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error || new Error('Could not save cached video.'));
        tx.onabort = () => reject(tx.error || new Error('Could not save cached video.'));
      });

      cachedVideoMeta = {
        name: file.name || 'cached-video.mp4',
        type: file.type || 'video/mp4',
        size: Number(file.size || 0),
        lastModified: Number(file.lastModified || Date.now()),
        savedAt: Date.now()
      };

      writeCachedVideoMetaToStorage(cachedVideoMeta);
    }

/* Load the cached source video back from IndexedDB as a File for preview and rendering. */
    async function getCachedSourceVideoFile() {
      const db = await openVideoCacheDb();

      const record = await new Promise((resolve, reject) => {
        const tx = db.transaction(VIDEO_CACHE_STORE_NAME, 'readonly');
        const store = tx.objectStore(VIDEO_CACHE_STORE_NAME);
        const request = store.get(VIDEO_CACHE_KEY);

        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error || new Error('Could not read cached video.'));
      });

      if (!record || !(record.blob instanceof Blob)) {
        return null;
      }

      return new File(
        [record.blob],
        record.name || cachedVideoMeta?.name || 'cached-video.mp4',
        {
          type: record.type || cachedVideoMeta?.type || 'video/mp4',
          lastModified: Number(record.lastModified || cachedVideoMeta?.lastModified || Date.now())
        }
        );
    }

/* Determine whether a reusable cached source video is available in the browser. */
    async function hasCachedSourceVideo() {
      try {
        const file = await getCachedSourceVideoFile();
        return !!file;
      } catch {
        return false;
      }
    }

/* Load the cached source video into the hidden input and preview player. */
    async function reuseCachedSourceVideo() {
      const file = await getCachedSourceVideoFile();

      if (!file) {
        throw new Error('No cached video is available yet.');
      }

      setFileInput(videoInput, file);
      await loadSourceVideoPreview(file);
      updateMeta();
      refreshGui();
      return file;
    }



    /* Refresh top metadata with selected file names. */
/* Refresh top metadata with selected file names or the last cached source video. */
    function updateMeta() {
      const v = videoInput.files[0];
      const s = srtInput.files[0];
      const cachedLabel = !v && cachedVideoMeta?.name ? `${cachedVideoMeta.name} (cached)` : null;

      if (!v && !s && !cachedLabel) {
        selectionMeta.textContent = 'No files selected.';
        return;
      }

      selectionMeta.innerHTML =
    `<strong>Video:</strong> ${v ? v.name : (cachedLabel || '—')} &nbsp; · &nbsp; <strong>SRT:</strong> ${s ? s.name : '—'}`;
  }

    /* Convert ASS-size font into displayed-video CSS size. */
  function getPreviewScaleFactor() {
    if (!previewVideo.videoWidth || !previewVideo.videoHeight) return 1;

    const rect = previewVideo.getBoundingClientRect();
    if (!rect.width || !rect.height) return 1;

    const scaleX = rect.width / previewVideo.videoWidth;
    const scaleY = rect.height / previewVideo.videoHeight;
    return Math.min(scaleX, scaleY);
  }

    /* Force helper overlay to exactly match the displayed video rectangle. */
  function syncOverlayToVideo() {
    if (previewVideo.style.display === 'none') return;

    const videoRect = previewVideo.getBoundingClientRect();
    if (!videoRect.width || !videoRect.height) return;

    mediaFrame.style.width = `${videoRect.width}px`;
    mediaFrame.style.height = `${videoRect.height}px`;

    helperLayer.style.left = '0px';
    helperLayer.style.top = '0px';
    helperLayer.style.width = '100%';
    helperLayer.style.height = '100%';
  }

    /* Show or hide helper overlay. */
  function applyHelpersVisibility() {
    if (helpersVisible && previewVideo.style.display !== 'none') {
      helperLayer.classList.remove('hidden');
      helperLayer.style.display = 'block';
    } else {
      helperLayer.classList.add('hidden');
    }
  }





/* Repaint helper so it matches rendered width/scale/anchor more closely. */
  function applyHelperPreview() {
    const scale = getPreviewScaleFactor();
    const rect = helperLayer.getBoundingClientRect();
    const displayedWidth = rect.width || 0;

    const renderedBoxWidth = displayedWidth
    ? Math.max(120, displayedWidth - (controls.margin_h * scale * 2))
    : 320;

    const helperFontSize = Math.max(8, controls.font_size * scale * controls.helper_font_scale);
    const helperTranslate = getHelperTranslateForAlignment(controls.alignment);

    helperCaptionText.textContent = srtPreviewText;
    helperCaption.style.fontFamily = controls.font_name;
    helperCaption.style.fontSize = `${helperFontSize}px`;
    helperCaption.style.fontWeight = controls.bold ? '700' : '400';
    helperCaption.style.fontStyle = controls.italic ? 'italic' : 'normal';
    helperCaption.style.color = controls.primary_colour;
    helperCaption.style.textAlign = 'center';
    helperCaption.style.justifyContent = 'center';
    helperCaption.style.alignItems = 'center';
    helperCaption.style.width = `${renderedBoxWidth}px`;
    helperCaption.style.maxWidth = `${renderedBoxWidth}px`;
    helperCaption.style.minHeight = '0px';
    helperCaption.style.backgroundColor = controls.use_background
    ? `rgba(${parseInt(controls.background_colour.slice(1, 3), 16)}, ${parseInt(controls.background_colour.slice(3, 5), 16)}, ${parseInt(controls.background_colour.slice(5, 7), 16)}, ${controls.background_alpha})`
    : 'transparent';
    helperCaption.style.padding = controls.use_background
    ? `${0.18 * scale}em ${0.35 * scale}em`
    : `${0.06 * scale}em ${0.16 * scale}em`;
    helperCaption.style.letterSpacing = `${controls.letter_spacing * scale}px`;
    helperCaption.style.textShadow =
    `${controls.outline * scale}px 0 ${controls.outline_colour},
     ${-controls.outline * scale}px 0 ${controls.outline_colour},
     0 ${controls.outline * scale}px ${controls.outline_colour},
     0 ${-controls.outline * scale}px ${controls.outline_colour},
    ${controls.shadow * scale}px ${controls.shadow * scale}px ${controls.shadow_colour}`;
    helperCaption.style.left = `${controls.anchor_x * 100}%`;
    helperCaption.style.top = `${controls.anchor_y * 100}%`;
    helperCaption.style.transform =
  `translate(${helperTranslate}) translate(${controls.offset_x * scale}px, ${controls.offset_y * scale}px) rotate(${-controls.rotation_z}deg) scale(${controls.end_scale / 100})`;

  syncOverlayToVideo();
  applyHelpersVisibility();
}



/* Match helper anchor behavior to ASS alignment anchors. */
function getHelperTranslateForAlignment(alignment) {
  const a = Number(alignment);

  if (a === 1) return '-0%, -100%';
  if (a === 2) return '-50%, -100%';
  if (a === 3) return '-100%, -100%';

  if (a === 4) return '-0%, -50%';
  if (a === 5) return '-50%, -50%';
  if (a === 6) return '-100%, -50%';

  if (a === 7) return '-0%, -0%';
  if (a === 8) return '-50%, -0%';
  if (a === 9) return '-100%, -0%';

  return '-50%, -100%';
}




/* Resize helper box around center; width maps directly to render width via margin_h. */
function updateResizeFromHandle(clientX, clientY) {
  if (!resizeState) return;

  const scale = getPreviewScaleFactor();

    /* Open IndexedDB store for saved presets. */
function openPresetDb() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(PRESET_DB_NAME, 1);

    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains(PRESET_STORE_NAME)) {
        db.createObjectStore(PRESET_STORE_NAME, { keyPath: 'name' });
      }
    };

    request.onsuccess = () => {
      presetDb = request.result;
      resolve(presetDb);
    };

    request.onerror = () => {
      reject(request.error);
    };
  });
}

    /* Read every preset from IndexedDB. */
function getAllPresetsFromDb() {
  return new Promise((resolve, reject) => {
    const tx = presetDb.transaction(PRESET_STORE_NAME, 'readonly');
    const store = tx.objectStore(PRESET_STORE_NAME);
    const request = store.getAll();

    request.onsuccess = () => resolve(request.result || []);
    request.onerror = () => reject(request.error);
  });
}

    /* Save or overwrite one preset in IndexedDB. */
function putPresetToDb(presetObject) {
  return new Promise((resolve, reject) => {
    const tx = presetDb.transaction(PRESET_STORE_NAME, 'readwrite');
    const store = tx.objectStore(PRESET_STORE_NAME);
    const request = store.put(presetObject);

    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

    /* Delete one preset from IndexedDB. */
function deletePresetFromDb(name) {
  return new Promise((resolve, reject) => {
    const tx = presetDb.transaction(PRESET_STORE_NAME, 'readwrite');
    const store = tx.objectStore(PRESET_STORE_NAME);
    const request = store.delete(name);

    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

    items.forEach(item => {

    syncLocalStorageMirror();

  } catch {

/* Poll backend render status until preview/full render is ready or failed. */
async function startPolling(jobId) {
  if (pollTimer) clearInterval(pollTimer);

  pollTimer = setInterval(async () => {
    try {
      const response = await fetch(`/api/status/${jobId}`);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Status failed.');
      }

      if (data.status === 'queued' || data.status === 'preparing' || data.status === 'rendering') {
        showStatus('info', data.message);
        return;
      }

      if (data.status === 'done') {
        clearInterval(pollTimer);
        pollTimer = null;

        previewVideo.src = `${data.preview_url}?t=${Date.now()}`;
        previewVideo.style.display = 'block';
        placeholder.style.display = 'none';
        helperLayer.style.display = 'block';

        openPreview.href = data.preview_url;
        openAss.href = data.ass_url || '#';
        openPreview.style.display = 'inline-flex';
        openAss.style.display = data.ass_url ? 'inline-flex' : 'none';

        previewBtn.disabled = false;
        renderFullBtn.disabled = false;
        previewBtn.textContent = 'Render preview';
        renderFullBtn.textContent = 'Render full';

        showStatus('ok', 'Render ready.');

        requestAnimationFrame(() => {
          syncOverlayToVideo();
          applyHelperPreview();
        });

        return;
      }

      if (data.status === 'error') {
        clearInterval(pollTimer);
        pollTimer = null;

        previewBtn.disabled = false;
        renderFullBtn.disabled = false;
        previewBtn.textContent = 'Render preview';
        renderFullBtn.textContent = 'Render full';

        showStatus('err', data.message || 'Render failed.');
      }
    } catch (err) {
      clearInterval(pollTimer);
      pollTimer = null;

      previewBtn.disabled = false;
      renderFullBtn.disabled = false;
      previewBtn.textContent = 'Render preview';
      renderFullBtn.textContent = 'Render full';

      showStatus('err', err.message || 'Polling failed.');
    }
  }, 1000);
}

/* Convert SRT or VTT time text into milliseconds for native preview playback. */
function parseCueTimeToMs(value) {
  const normalized = String(value).trim().replace(',', '.');
  const match = normalized.match(/^(?:(\d+):)?(\d{2}):(\d{2})\.(\d{3})$/);

  if (!match) {
    return 0;
  }

  const hours = Number(match[1] || 0);
  const minutes = Number(match[2] || 0);
  const seconds = Number(match[3] || 0);
  const milliseconds = Number(match[4] || 0);

  return (((hours * 60) + minutes) * 60 + seconds) * 1000 + milliseconds;
}

/* Normalize subtitle text by removing lightweight markup used in VTT and preserving line breaks. */
function normalizeCueText(text) {
  return String(text || '')
  .replace(/<\d{2}:\d{2}:\d{2}\.\d{3}>/g, '')
  .replace(/<\/?c[^>]*>/g, '')
  .replace(/<\/?v[^>]*>/g, '')
  .replace(/<\/?i>/g, '')
  .replace(/<\/?b>/g, '')
  .replace(/<\/?u>/g, '')
  .replace(/<[^>]+>/g, '')
  .replace(/\r/g, '')
  .split('\n')
  .map(line => line.trim())
  .filter(Boolean)
  .join('\n')
  .trim();
}

/* Parse SRT subtitle text into timed cues for local native preview playback. */
function parseSrtCues(text) {
  const normalized = String(text || '').replace(/\r/g, '').trim();
  if (!normalized) {
    return [];
  }

  return normalized
  .split(/\n{2,}/)
  .map(block => block.trim())
  .filter(Boolean)
  .map(block => {
    const lines = block.split('\n');
    const timingLineIndex = lines.findIndex(line => line.includes('-->'));

    if (timingLineIndex === -1) {
      return null;
    }

    const timingLine = lines[timingLineIndex];
    const match = timingLine.match(/(\d{2}:\d{2}:\d{2},\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2},\d{3})/);

    if (!match) {
      return null;
    }

    const textLines = lines.slice(timingLineIndex + 1);
    const cueText = normalizeCueText(textLines.join('\n'));

    if (!cueText) {
      return null;
    }

    return {
      start: parseCueTimeToMs(match[1]),
      end: parseCueTimeToMs(match[2]),
      text: cueText
    };
  })
  .filter(cue => cue && cue.end > cue.start);
}

/* Parse VTT subtitle text into timed cues for local native preview playback. */
function parseVttCues(text) {
  const normalized = String(text || '').replace(/\r/g, '').trim();
  if (!normalized) {
    return [];
  }

  return normalized
  .split(/\n{2,}/)
  .map(block => block.trim())
  .filter(Boolean)
  .map(block => {
    const lines = block.split('\n').filter(Boolean);

    if (!lines.length) {
      return null;
    }

    if (/^WEBVTT/i.test(lines[0]) || /^NOTE\b/i.test(lines[0]) || /^STYLE\b/i.test(lines[0]) || /^REGION\b/i.test(lines[0])) {
      return null;
    }

    const timingLineIndex = lines.findIndex(line => line.includes('-->'));

    if (timingLineIndex === -1) {
      return null;
    }

    const timingLine = lines[timingLineIndex];
    const match = timingLine.match(/(\d{2}:\d{2}:\d{2}\.\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}\.\d{3})/);

    if (!match) {
      return null;
    }

    const textLines = lines.slice(timingLineIndex + 1);
    const cueText = normalizeCueText(textLines.join('\n'));

    if (!cueText) {
      return null;
    }

    return {
      start: parseCueTimeToMs(match[1]),
      end: parseCueTimeToMs(match[2]),
      text: cueText
    };
  })
  .filter(cue => cue && cue.end > cue.start);
}

/* Parse subtitle cues from the uploaded subtitle file for local live preview playback. */
function parseSubtitleCues(text, filename) {
  if (/\.vtt$/i.test(filename)) {
    return parseVttCues(text);
  }

  return parseSrtCues(text);
}

/* Find the active subtitle cue for the current local video playback time. */
function getActiveSubtitleCue(currentMs) {
  return subtitleCues.find(cue => currentMs >= cue.start && currentMs < cue.end) || null;
}

/* Update the helper caption text so the local player shows timed native subtitle preview. */
function syncNativeCaptionPreview() {
  if (!nativeCaptionPreviewEnabled || !subtitleCues.length || previewVideo.style.display === 'none') {
    helperCaptionText.textContent = srtPreviewText;
    return;
  }

  const currentMs = Math.max(0, Math.floor((previewVideo.currentTime || 0) * 1000));
  const activeCue = getActiveSubtitleCue(currentMs);

  helperCaptionText.textContent = activeCue ? activeCue.text : '';
}

    /* Convert drag position inside helper layer into normalized anchor coordinates. */
/* Drag helper inside visible video bounds and keep it from escaping. */
function updateFromDrag(clientX, clientY) {
  const rect = helperLayer.getBoundingClientRect();
  const boxRect = helperCaption.getBoundingClientRect();
  if (!rect.width || !rect.height) return;

  const halfW = Math.min(boxRect.width / 2, rect.width / 2);
  const halfH = Math.min(boxRect.height / 2, rect.height / 2);

  const clampedX = Math.max(rect.left + halfW, Math.min(rect.right - halfW, clientX));
  const clampedY = Math.max(rect.top + halfH, Math.min(rect.bottom - halfH, clientY));

  controls.anchor_x = Number(((clampedX - rect.left) / rect.width).toFixed(4));
  controls.anchor_y = Number(((clampedY - rect.top) / rect.height).toFixed(4));
  controls.offset_x = 0;
  controls.offset_y = 0;

  refreshGui();
  applyHelperPreview();
}

    applyPresetObject(presetsCache[name]);
    showStatus('ok', `Preset loaded: <strong>${name}</strong>`);
    refreshGui();
  },

  /* Save current controls into the selected preset or prompt for a new name. */
  async save_preset() {
    await savePreset();
    refreshGui();
  },

  /* Save current controls as a new preset. */
  async save_as_preset() {
    await savePresetAs();
    refreshGui();
  },

  /* Delete the selected preset. */
  async delete_preset() {
    await deletePreset();
    refreshGui();
  },

  /* Export the current or selected preset to JSON. */
  export_preset() {
    exportPreset();
    refreshGui();
  },

  /* Trigger the backend preset import input from lil-gui. */
  import_preset() {
    /* Vulnerable block: file picker must only open from a direct user interaction. */
    if (presetImportInput) {
      presetImportInput.click();
    }
  },

  /* Start preview rendering from the current Preview folder settings. */
  async render_preview() {
    await renderVideo('preview');
    refreshGui();
  },

  /* Start full rendering. */
  async render_full() {
    await renderVideo('full');
    refreshGui();
  },

  /* Open the preview asset when available. */
  open_preview() {
    /* Vulnerable block: open only validated non-placeholder links. */
    if (!openPreview || !openPreview.href || openPreview.href === '#') {
      showStatus('err', 'Preview is not ready yet.');
      refreshGui();
      return;
    }

    window.open(openPreview.href, '_blank', 'noopener');
  },

  /* Open the ASS asset when available. */
  open_ass() {
    /* Vulnerable block: open only validated non-placeholder links. */
    if (!openAss || !openAss.href || openAss.href === '#') {
      showStatus('err', 'ASS file is not ready yet.');
      refreshGui();
      return;
    }

    window.open(openAss.href, '_blank', 'noopener');
  },

  /* Reset the full UI state. */
  reset_all() {
    resetUI();
    refreshGui();
  }
};








/* Refresh lil-gui when backend bridge state changes outside lil-gui callbacks. */
function bindActionGuiObservers() {
  const observer = new MutationObserver(() => {
    refreshGui();
  });

  [statusEl, openPreview, openAss, previewBtn, renderFullBtn]
  .filter(Boolean)
  .forEach(element => {
    observer.observe(element, {
      attributes: true,
      childList: true,
      subtree: true,
      attributeFilter: ['style', 'href', 'class', 'disabled']
    });
  });

  if (videoInput) {
    videoInput.addEventListener('change', () => refreshGui());
  }

  if (srtInput) {
    srtInput.addEventListener('change', () => refreshGui());
  }

  if (presetSelect) {
    presetSelect.addEventListener('change', () => refreshGui());
  }

  if (presetImportInput) {
    presetImportInput.addEventListener('change', () => refreshGui());
  }
}

previewFolder.add(controls, 'preview_start', 0, 3600, 0.5).name('Start (s)').onChange(value => {
  /* Vulnerable block: clamp seek target to valid media duration before applying it to the local player. */
  const numericValue = Math.max(0, Number(value) || 0);

  if (previewVideo.readyState >= 1) {
    const maxTime = Number.isFinite(previewVideo.duration) ? previewVideo.duration : numericValue;
    previewVideo.currentTime = Math.min(numericValue, maxTime);
    syncNativeCaptionPreview();
  }
});

/* Accept dropped source video and subtitle files, then persist the video in browser cache for reuse. */
document.body.addEventListener('drop', async event => {
  const files = [...event.dataTransfer.files];
  const videoFile = files.find(file => /\.(mp4|mov|m4v)$/i.test(file.name));
  const srtFile = files.find(file => /\.(srt|vtt)$/i.test(file.name));

  if (videoFile) {
    setFileInput(videoInput, videoFile);
    await loadSourceVideoPreview(videoFile);
  }

  if (srtFile) {
    setFileInput(srtInput, srtFile);
    await readSrtPreview(srtFile);
  }

  updateMeta();
});

/* Load a newly selected source video, update preview, and refresh the cached browser copy. */
videoInput.addEventListener('change', async () => {
  const file = videoInput.files[0];

  if (file) {
    await loadSourceVideoPreview(file);
  }

  updateMeta();
});

srtInput.addEventListener('change', async () => {
  updateMeta();
  const file = srtInput.files[0];
  if (file) {
    await readSrtPreview(file);
  }
  refreshGui();
});
